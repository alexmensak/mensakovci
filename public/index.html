<!DOCTYPE html>
<html lang="sk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veronika & Alexander | 26. september 2026</title>
    <meta name="description"
        content="Srdečne Vás pozývame na našu svadbu. Veronika Babulová a Alexander Mensák, 26. september 2026, Liptovský Ján.">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💍</text></svg>">
    <style>
        .landing-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
            text-align: center;
        }

        .landing-links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-top: 3rem;
        }

        @media (min-width: 600px) {
            .landing-links {
                flex-direction: row;
                flex-wrap: wrap;
                justify-content: center;
                gap: 1.5rem;
            }
        }

        .landing-link {
            display: inline-block;
            padding: 1rem 2rem;
            font-family: var(--font-serif);
            font-size: 0.9rem;
            color: var(--color-text);
            text-decoration: none;
            border: 1px solid var(--color-accent);
            border-radius: 4px;
            transition: var(--transition);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .landing-link:hover {
            background: var(--color-accent);
            color: var(--color-bg);
        }

        .landing-info {
            margin-top: 4rem;
            font-size: 0.875rem;
            opacity: 0.6;
            max-width: 400px;
        }
    </style>
</head>

<body>

    <div class="landing-container">
        <div class="monogram fade-in">V & A</div>
        <h1 class="hero-names fade-in delay-1">Veronika & Alexander</h1>
        <p class="hero-date fade-in delay-2">Sobota, 26. september 2026</p>
        <p class="hero-invitation fade-in delay-3">S radosťou Vás pozývame</p>

        <div class="landing-links fade-in delay-4">
            <a href="hostina" class="landing-link">Hostina</a>
            <a href="ubytovanie" class="landing-link">Hostina + Ubytovanie</a>
            <a href="zabava" class="landing-link">Večerná zábava</a>
        </div>

        <p class="landing-info fade-in delay-4">
            Vyberte si prosím správny odkaz podľa vašej pozvánky
        </p>
    </div>

</body>

</html>
